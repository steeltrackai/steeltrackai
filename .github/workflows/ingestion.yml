name: Costco Ninjutsu Ingestion

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  ingest:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install playwright playwright-stealth beautifulsoup4 requests python-dotenv
          playwright install chromium

      - name: Run Ninjutsu Harvester
        env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
          WEBSHARE_USER: ${{ secrets.WEBSHARE_USER }}
          WEBSHARE_PASS: ${{ secrets.WEBSHARE_PASS }}
          GITHUB_ACTIONS: "true"
        run: python scripts/CostcoNodriverHarvester.py

      - name: Commit Progress
        run: |
          git config --global user.name "SteelTrack AI Bot"
          git config --global user.email "bot@steeltrack.ai"
          # Safely check if file exists before adding
          if [ -f scripts/costco_done.txt ]; then
            git add scripts/costco_done.txt
            git commit -m "💎 [Stash] Updated catalog progress [skip ci]" || echo "No changes to commit"
            git push
          else
            echo "No progress file found. Skipping commit."
          fi
